services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iot-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    networks:
      - iot-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_MQTT_BROKER_URL=${VITE_MQTT_BROKER_URL}
        - VITE_MQTT_USERNAME=${VITE_MQTT_USERNAME}
        - VITE_MQTT_PASSWORD=${VITE_MQTT_PASSWORD}
        - VITE_MQTT_CLIENT_PREFIX=${VITE_MQTT_CLIENT_PREFIX}
    container_name: iot-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - iot-network

networks:
  iot-network:
    driver: bridge
