# ──────────────────────────────────────────────
# Eclipse Mosquitto Configuration
# IoT Weather System
# ──────────────────────────────────────────────

listener 1883
protocol mqtt

listener 9001
protocol websockets

allow_anonymous true

persistence true
persistence_location /mosquitto/data
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

max_inflight_messages 100
max_queued_messages 1000
queue_qos0_messages true

# Topic hierarchy for weather system
# weather/live     - Real-time sensor readings
# weather/alerts   - System alerts
# weather/status   - Device status updates
# weather/system   - System health
# weather/device/logs - Device diagnostic logs
